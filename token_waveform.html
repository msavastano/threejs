<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token Waveform</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #05070d; font-family: ui-monospace, Menlo, Consolas, monospace; }
  #c { display: block; width: 100%; height: 100%; }

  /* Latency indicator */
  #latency {
    position: fixed; right: 28px; top: 50%; transform: translateY(-50%);
    height: 60vh; width: 4px; background: #2a3344; border-radius: 2px;
  }
  #marker {
    position: absolute; left: 50%; transform: translate(-50%, 50%);
    bottom: 0; width: 26px; height: 6px; border-radius: 3px;
    background: #00ff88; box-shadow: 0 0 12px #00ff88;
    transition: bottom 120ms linear;
  }
  .lat-label { position: fixed; right: 14px; color: #8899aa; font-size: 11px; letter-spacing: 1px; }
  #lbl-slow { top: calc(20vh - 22px); color: #cc4444; }
  #lbl-fast { top: calc(80vh + 10px); color: #44cc88; }
  #lbl-title { top: calc(20vh - 40px); }
  #readout { position: fixed; right: 14px; top: calc(80vh + 28px); color: #cfd8e3; font-size: 13px; text-align: right; line-height: 1.5; }
  #readout .dim { color: #8899aa; }

  /* Controls */
  #panel { position: fixed; left: 16px; bottom: 16px; display: flex; gap: 8px; }
  #panel button {
    background: #11161f; color: #cfd8e3; border: 1px solid #2a3344; border-radius: 6px;
    padding: 7px 12px; font: 12px ui-monospace, monospace; cursor: pointer;
  }
  #panel button:hover { border-color: #44cc88; }
  #hint { position: fixed; left: 16px; top: 14px; color: #5a6678; font-size: 11px; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.181.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.181.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<canvas id="c"></canvas>

<div id="latency"><div id="marker"></div></div>
<div class="lat-label" id="lbl-title">LATENCY</div>
<div class="lat-label" id="lbl-slow">SLOW</div>
<div class="lat-label" id="lbl-fast">FAST</div>
<div id="readout"><span id="tps">–</span> TPS<br><span class="dim" id="ms">–</span></div>

<div id="panel">
  <button onclick="window.injectToken(70)">Fast burst (70 TPS)</button>
  <button onclick="window.injectToken(6)">Slow crawl (6 TPS)</button>
  <button onclick="window._resumeSim()">Resume auto stream</button>
</div>
<div id="hint">window.injectToken(tps) is exposed on the console — try injectToken(80) or injectToken(3)</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ===================== TOKEN WAVEFORM =====================
const GRID = 100, SIZE = 60, RIPPLE_SPEED = 13, MAX_DIST = Math.hypot(SIZE/2, SIZE/2);
const canvas = document.getElementById('c');
let W = innerWidth, H = innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, W/H, 0.1, 1000);
camera.position.set(0, 26, 44);
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x05070d, 1);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 1, 0);

// ---------- Grid surface (100x100 points) ----------
const geo = new THREE.PlaneGeometry(SIZE, SIZE, GRID-1, GRID-1);
const pos = geo.attributes.position;
const N = pos.count; // 10,000
const dist = new Float32Array(N);
for (let i = 0; i < N; i++) dist[i] = Math.hypot(pos.getX(i), pos.getY(i));
const colArr = new Float32Array(N*3);
geo.setAttribute('color', new THREE.BufferAttribute(colArr, 3));
const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ wireframe: true, vertexColors: true }));
mesh.rotation.x = -Math.PI/2;
scene.add(mesh);

// ---------- Bloom ----------
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(W, H), 0.7, 0.5, 0.12));

// ---------- State ----------
const GREEN = new THREE.Color(0.06, 1.0, 0.45);
const RED   = new THREE.Color(0.60, 0.02, 0.03);
const baseColor = new THREE.Color();
let ripples = [];
let tpsSmooth = 40, latencyDisplay = 0;
let lastToken = performance.now(), lastRipple = 0, simPausedUntil = 0;

function _inject(v) {
  const now = performance.now();
  v = Math.max(0.5, Number(v) || 0.5);
  tpsSmooth = tpsSmooth * 0.8 + v * 0.2;
  lastToken = now;
  const amp = 0.5 + Math.min(v/60, 1) * 1.8;
  if (now - lastRipple > 90) {           // throttle: one ring per ~90ms
    ripples.push({ t0: now, amp });
    lastRipple = now;
    if (ripples.length > 20) ripples.shift();
  } else if (ripples.length) {           // merge energy into latest ring
    const r = ripples[ripples.length-1];
    r.amp = Math.min(r.amp + amp*0.15, 2.6);
  }
}
// Public API — manual calls pause the demo stream for 8s
window.injectToken = (v) => { simPausedUntil = performance.now() + 8000; _inject(v); };
window._resumeSim = () => { simPausedUntil = 0; };

// ---------- Demo token stream (varies 3–75 TPS) ----------
(function simTick() {
  const now = performance.now();
  let tps = 38 + 32 * Math.sin(now/1000 * 0.18) + (Math.random()*10 - 5);
  tps = Math.max(3, Math.min(75, tps));
  if (now > simPausedUntil) _inject(tps);
  setTimeout(simTick, Math.max(30, 1000 / Math.max(4, tpsSmooth)));
})();

// ---------- HUD elements ----------
const markerEl = document.getElementById('marker');
const tpsEl = document.getElementById('tps');
const msEl = document.getElementById('ms');
let lastReadout = 0;

// ---------- Animation ----------
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();

  // prune dead ripples
  ripples = ripples.filter(rp => (now - rp.t0)/1000 * RIPPLE_SPEED < MAX_DIST + 12);

  // latency model: high TPS -> low latency (green), low TPS / stalls -> red
  const latMs = 1000 / tpsSmooth;
  let target = Math.min(1, Math.max(0, (latMs - 14) / 186));
  const stale = (now - lastToken) / 1000;
  if (stale > 1.2) target = Math.min(1, Math.max(target, (stale - 1.2) / 2));
  latencyDisplay += (target - latencyDisplay) * 0.06;
  baseColor.copy(GREEN).lerp(RED, latencyDisplay);

  // surface heights: ambient pulse + expanding ripple rings
  const energy = Math.min(tpsSmooth/60, 1);
  const nR = ripples.length;
  for (let i = 0; i < N; i++) {
    const r = dist[i];
    let h = energy * 0.5 * Math.sin(r*0.35 - now*0.0022) * Math.exp(-r*0.045);
    for (let j = 0; j < nR; j++) {
      const rp = ripples[j];
      const age = (now - rp.t0)/1000;
      const d = r - age*RIPPLE_SPEED;
      if (d > -7 && d < 7)
        h += rp.amp * Math.sin(d*1.1) * Math.exp(-(d*d)/8) * Math.exp(-age*0.45);
    }
    pos.array[i*3+2] = h;
    const bri = 0.3 + Math.min(Math.abs(h)*0.6, 0.7);
    colArr[i*3]   = baseColor.r * bri;
    colArr[i*3+1] = baseColor.g * bri;
    colArr[i*3+2] = baseColor.b * bri;
  }
  pos.needsUpdate = true;
  geo.attributes.color.needsUpdate = true;

  // HUD: marker rises when slow, falls when fast
  const css = '#' + baseColor.getHexString();
  markerEl.style.bottom = (latencyDisplay * 100) + '%';
  markerEl.style.background = css;
  markerEl.style.boxShadow = '0 0 12px ' + css;
  if (now - lastReadout > 250) {
    lastReadout = now;
    tpsEl.textContent = tpsSmooth.toFixed(0);
    msEl.textContent = (1000/tpsSmooth).toFixed(0) + ' ms/tok';
  }

  controls.update();
  composer.render();
}
animate();

addEventListener('resize', () => {
  W = innerWidth; H = innerHeight;
  camera.aspect = W/H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
  composer.setSize(W, H);
});
</script>
</body>
</html>
