<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Quantum Accretion Disk</title>
<style>
  :root {
    --accent: #7fb6ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #cfe2ff;
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  /* Subtle vignette overlay sitting above the canvas */
  #vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
    background:
      radial-gradient(ellipse at center,
        rgba(0,0,0,0) 38%,
        rgba(0,0,0,0.35) 72%,
        rgba(0,0,0,0.85) 100%);
    mix-blend-mode: multiply;
  }

  /* Title plate */
  #title {
    position: fixed;
    top: 26px;
    left: 30px;
    z-index: 20;
    pointer-events: none;
    user-select: none;
  }
  #title h1 {
    font-size: 19px;
    font-weight: 600;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #eaf2ff;
    text-shadow: 0 0 18px rgba(127,182,255,0.55);
  }
  #title p {
    margin-top: 6px;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(160,190,235,0.6);
  }

  /* Loading screen */
  #loader {
    position: fixed;
    inset: 0;
    z-index: 30;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    transition: opacity 0.9s ease;
    letter-spacing: 0.3em;
    font-size: 12px;
    text-transform: uppercase;
    color: rgba(180,205,245,0.75);
  }
  #loader.hidden { opacity: 0; pointer-events: none; }

  /* lil-gui dark tuning */
  .lil-gui {
    --background-color: rgba(8,12,22,0.82);
    --widget-color: rgba(40,55,85,0.9);
    --focus-color: #2a3a5c;
    --hover-color: #34487096;
    --font-family: "Segoe UI", system-ui, sans-serif;
    --title-background-color: rgba(12,18,30,0.95);
    backdrop-filter: blur(8px);
    z-index: 25 !important;
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "lil-gui": "https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.js"
  }
}
</script>
</head>
<body>
  <div id="app"></div>
  <div id="vignette"></div>
  <div id="title">
    <h1>The Quantum Accretion Disk</h1>
    <p>Three.js &middot; Custom GLSL &middot; Unreal Bloom</p>
  </div>
  <div id="loader">Spinning up spacetime&hellip;</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { GUI } from 'lil-gui';

/* ------------------------------------------------------------------ *
 *  Core scene / renderer / camera
 * ------------------------------------------------------------------ */
const container = document.getElementById('app');

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 1);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 26, 62);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 22;
controls.maxDistance = 220;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.25;
controls.target.set(0, 0, 0);

/* Geometry scale reference (world units) */
const BH_RADIUS    = 9.0;   // event-horizon black sphere
const DISK_INNER   = 11.0;  // inner edge of particle disk
const DISK_OUTER   = 46.0;  // outer edge of particle disk

/* ------------------------------------------------------------------ *
 *  Procedural starfield background  (equirectangular texture)
 *  Generated on a canvas so the whole thing stays single-file.
 *  Used both as the scene background AND sampled by the lensing shader.
 * ------------------------------------------------------------------ */
function makeStarfieldTexture(w = 2048, h = 1024) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');

  // Deep-space gradient base
  const g = ctx.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0.0, '#04060f');
  g.addColorStop(0.5, '#070313');
  g.addColorStop(1.0, '#02040b');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);

  // Faint nebula blooms
  const nebColors = ['#1b2c5a', '#3a1f55', '#123a4a', '#451d3a'];
  for (let i = 0; i < 26; i++) {
    const x = Math.random() * w;
    const y = Math.random() * h;
    const r = 120 + Math.random() * 320;
    const rg = ctx.createRadialGradient(x, y, 0, x, y, r);
    const col = nebColors[(Math.random() * nebColors.length) | 0];
    rg.addColorStop(0, col);
    rg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.globalAlpha = 0.05 + Math.random() * 0.09;
    ctx.fillStyle = rg;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Stars — three brightness tiers for depth
  const drawStars = (count, maxR, alphaBase) => {
    for (let i = 0; i < count; i++) {
      const x = Math.random() * w;
      const y = Math.random() * h;
      const r = Math.random() * maxR + 0.25;
      const a = alphaBase + Math.random() * (1 - alphaBase);
      // slight color temperature variation
      const t = Math.random();
      const col = t < 0.7
        ? `rgba(255,255,255,${a})`
        : t < 0.88
          ? `rgba(180,205,255,${a})`
          : `rgba(255,225,190,${a})`;
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }
  };
  drawStars(2600, 0.9, 0.25);  // dim field
  drawStars(420, 1.5, 0.55);   // mid
  drawStars(70, 2.4, 0.8);     // bright, with glow
  // glow on the brightest few
  for (let i = 0; i < 40; i++) {
    const x = Math.random() * w, y = Math.random() * h;
    const r = 2 + Math.random() * 4;
    const rg = ctx.createRadialGradient(x, y, 0, x, y, r * 4);
    rg.addColorStop(0, 'rgba(255,255,255,0.9)');
    rg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = rg;
    ctx.beginPath();
    ctx.arc(x, y, r * 4, 0, Math.PI * 2);
    ctx.fill();
  }

  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.mapping = THREE.EquirectangularReflectionMapping;
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.ClampToEdgeWrapping;
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}

const starTexture = makeStarfieldTexture();
scene.background = starTexture;

/* ------------------------------------------------------------------ *
 *  Event horizon — pure black sphere
 * ------------------------------------------------------------------ */
const blackHole = new THREE.Mesh(
  new THREE.SphereGeometry(BH_RADIUS, 64, 64),
  new THREE.MeshBasicMaterial({ color: 0x000000 })
);
scene.add(blackHole);

/* ------------------------------------------------------------------ *
 *  Gravitational lensing shell (fake)
 *  A slightly larger sphere whose fragment shader samples the
 *  starfield with a radial warp toward the silhouette edge, and adds
 *  a hot photon-ring rim. Rendered as a transparent additive shell.
 * ------------------------------------------------------------------ */
const lensingUniforms = {
  uStarTex:   { value: starTexture },
  uTime:      { value: 0 },
  uStrength:  { value: 0.55 },      // warp amount
  uRingColor: { value: new THREE.Color(0xffd9a0) }
};

const lensingMaterial = new THREE.ShaderMaterial({
  uniforms: lensingUniforms,
  transparent: true,
  side: THREE.BackSide,          // render inner face -> we see the shell around the silhouette
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexShader: /* glsl */`
    varying vec3 vWorldNormal;
    varying vec3 vViewDir;
    void main() {
      vec4 worldPos = modelMatrix * vec4(position, 1.0);
      vWorldNormal = normalize(mat3(modelMatrix) * normal);
      vViewDir = normalize(cameraPosition - worldPos.xyz);
      gl_Position = projectionMatrix * viewMatrix * worldPos;
    }
  `,
  fragmentShader: /* glsl */`
    precision highp float;
    uniform sampler2D uStarTex;
    uniform float uTime;
    uniform float uStrength;
    uniform vec3  uRingColor;
    varying vec3 vWorldNormal;
    varying vec3 vViewDir;

    const float PI = 3.141592653589793;

    // Sample the equirectangular starfield from a direction vector
    vec3 sampleSky(vec3 dir) {
      dir = normalize(dir);
      float u = atan(dir.z, dir.x) / (2.0 * PI) + 0.5;
      float v = asin(clamp(dir.y, -1.0, 1.0)) / PI + 0.5;
      return texture2D(uStarTex, vec2(u, v)).rgb;
    }

    void main() {
      // fresnel-like term: 1 at silhouette edge, 0 facing camera
      float facing = clamp(dot(normalize(vWorldNormal), normalize(vViewDir)), 0.0, 1.0);
      float edge = 1.0 - facing;

      // Bend the view ray more strongly as we approach the silhouette.
      // Warp the sky lookup direction toward the normal to fake light deflection.
      float bend = pow(edge, 2.2) * uStrength * 3.0;
      vec3 dir = normalize(vViewDir + vWorldNormal * bend);

      vec3 sky = sampleSky(dir);

      // Photon ring: a hot, thin band hugging the silhouette edge
      float ring = smoothstep(0.62, 0.97, edge) * (1.0 - smoothstep(0.97, 1.0, edge));
      vec3 ringGlow = uRingColor * ring * 2.2;

      // Lensed starlight intensifies near the edge where rays compress
      float compress = smoothstep(0.2, 0.95, edge);
      vec3 col = sky * (0.35 + compress * 1.4) + ringGlow;

      // Fade the shell to nothing on the camera-facing center so the
      // pure-black sphere shows through cleanly.
      float alpha = smoothstep(0.12, 0.9, edge);
      gl_FragColor = vec4(col, alpha);
    }
  `
});

const lensingShell = new THREE.Mesh(
  new THREE.SphereGeometry(BH_RADIUS * 1.35, 96, 96),
  lensingMaterial
);
scene.add(lensingShell);

/* ------------------------------------------------------------------ *
 *  Accretion disk — 100,000 particle Points system w/ custom shader
 * ------------------------------------------------------------------ */
const PARTICLE_COUNT = 100000;

const positions   = new Float32Array(PARTICLE_COUNT * 3); // base XZ position (y≈0 plane)
const aRadius      = new Float32Array(PARTICLE_COUNT);     // orbital radius
const aAngle       = new Float32Array(PARTICLE_COUNT);     // starting angle
const aSize        = new Float32Array(PARTICLE_COUNT);     // per-particle size
const aSeed        = new Float32Array(PARTICLE_COUNT);     // random seed for flicker

for (let i = 0; i < PARTICLE_COUNT; i++) {
  // Bias toward inner radii so the core looks dense (sqrt distribution, then squared bias)
  const t = Math.random();
  const radius = DISK_INNER + (DISK_OUTER - DISK_INNER) * Math.pow(t, 1.7);
  const angle = Math.random() * Math.PI * 2;

  // Disk thickness — thinner near the center, flared at the rim
  const flare = THREE.MathUtils.mapLinear(radius, DISK_INNER, DISK_OUTER, 0.25, 2.6);
  const y = (Math.random() - 0.5) * flare;

  positions[i * 3 + 0] = Math.cos(angle) * radius;
  positions[i * 3 + 1] = y;
  positions[i * 3 + 2] = Math.sin(angle) * radius;

  aRadius[i] = radius;
  aAngle[i]  = angle;
  aSize[i]   = 0.6 + Math.random() * 2.4;
  aSeed[i]   = Math.random() * 1000.0;
}

const diskGeometry = new THREE.BufferGeometry();
diskGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
diskGeometry.setAttribute('aRadius',  new THREE.BufferAttribute(aRadius, 1));
diskGeometry.setAttribute('aAngle',   new THREE.BufferAttribute(aAngle, 1));
diskGeometry.setAttribute('aSize',    new THREE.BufferAttribute(aSize, 1));
diskGeometry.setAttribute('aSeed',    new THREE.BufferAttribute(aSeed, 1));

const diskUniforms = {
  uTime:        { value: 0 },
  uSpeed:       { value: 1.0 },
  uInner:       { value: DISK_INNER },
  uOuter:       { value: DISK_OUTER },
  uPixelRatio:  { value: renderer.getPixelRatio() },
  uSizeScale:   { value: 1.0 },
  uColorCool:   { value: new THREE.Color(0x2f6bff) }, // outer
  uColorWarm:   { value: new THREE.Color(0xff7a1a) }, // mid-inner
  uColorHot:    { value: new THREE.Color(0xffffff) }  // core
};

const diskMaterial = new THREE.ShaderMaterial({
  uniforms: diskUniforms,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexShader: /* glsl */`
    precision highp float;

    attribute float aRadius;
    attribute float aAngle;
    attribute float aSize;
    attribute float aSeed;

    uniform float uTime;
    uniform float uSpeed;
    uniform float uInner;
    uniform float uOuter;
    uniform float uPixelRatio;
    uniform float uSizeScale;

    varying float vNorm;   // 0 = outer edge, 1 = inner edge
    varying float vSeed;

    void main() {
      // Keplerian-ish angular velocity: faster closer in (~ r^-1.5).
      float omega = uSpeed * 1.6 / pow(aRadius, 1.5);
      float angle = aAngle + uTime * omega * 12.0;

      // Slight inward spiral wobble so the disk feels alive
      float r = aRadius + sin(uTime * 0.6 + aSeed) * 0.25;

      vec3 pos = position;
      pos.x = cos(angle) * r;
      pos.z = sin(angle) * r;

      // normalized radial position: 1 at the hot inner edge, 0 at cool rim
      float nr = 1.0 - clamp((aRadius - uInner) / (uOuter - uInner), 0.0, 1.0);
      vNorm = nr;
      vSeed = aSeed;

      vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);

      // Inner particles a touch larger + flicker; attenuate with distance
      float flicker = 0.8 + 0.2 * sin(uTime * 6.0 + aSeed * 1.7);
      float size = aSize * uSizeScale * (0.7 + nr * 1.8) * flicker;
      gl_PointSize = size * uPixelRatio * (300.0 / -mvPosition.z);

      gl_Position = projectionMatrix * mvPosition;
    }
  `,
  fragmentShader: /* glsl */`
    precision highp float;

    uniform vec3 uColorCool;
    uniform vec3 uColorWarm;
    uniform vec3 uColorHot;

    varying float vNorm;
    varying float vSeed;

    void main() {
      // Soft circular sprite — radial falloff, fully procedural (no texture)
      vec2 uv = gl_PointCoord - 0.5;
      float d = length(uv);
      if (d > 0.5) discard;
      float glow = smoothstep(0.5, 0.0, d);       // soft edge
      float core = smoothstep(0.18, 0.0, d);      // bright center

      // Temperature ramp by radius: cool blue -> orange -> white-hot
      vec3 col;
      if (vNorm < 0.5) {
        col = mix(uColorCool, uColorWarm, smoothstep(0.0, 0.5, vNorm));
      } else {
        col = mix(uColorWarm, uColorHot, smoothstep(0.5, 1.0, vNorm));
      }
      // push the very core toward white
      col = mix(col, uColorHot, core * 0.6);

      // Brightness rises sharply toward the center -> blooms hard
      float intensity = (0.25 + vNorm * vNorm * 2.6);
      vec3 finalColor = col * intensity * (glow + core * 1.5);

      float alpha = glow;
      gl_FragColor = vec4(finalColor, alpha);
    }
  `
});

const accretionDisk = new THREE.Points(diskGeometry, diskMaterial);
scene.add(accretionDisk);

/* A faint secondary inner "ember" ring for extra core density --------- */
const innerGlow = new THREE.Mesh(
  new THREE.RingGeometry(DISK_INNER * 0.98, DISK_INNER * 1.02, 128),
  new THREE.MeshBasicMaterial({
    color: 0xffe3b0,
    transparent: true,
    opacity: 0.35,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
    depthWrite: false
  })
);
innerGlow.rotation.x = Math.PI / 2;
scene.add(innerGlow);

/* ------------------------------------------------------------------ *
 *  Post-processing — RenderPass + UnrealBloom
 * ------------------------------------------------------------------ */
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.0,    // strength — default off; additive disk already self-glows, bloom stacks to white-out
  0.55,   // radius
  0.0     // threshold (low -> disk glows fully)
);
composer.addPass(bloomPass);

/* Final vignette/grain pass for a cinematic finish ------------------- */
const vignetteShader = {
  uniforms: {
    tDiffuse: { value: null },
    uOffset:  { value: 1.15 },
    uDarkness:{ value: 0.85 }
  },
  vertexShader: /* glsl */`
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: /* glsl */`
    uniform sampler2D tDiffuse;
    uniform float uOffset;
    uniform float uDarkness;
    varying vec2 vUv;
    void main() {
      vec4 tex = texture2D(tDiffuse, vUv);
      vec2 uv = (vUv - 0.5) * vec2(uOffset);
      float vig = clamp(1.0 - dot(uv, uv) * uDarkness, 0.0, 1.0);
      gl_FragColor = vec4(tex.rgb * vig, tex.a);
    }
  `
};
const vignettePass = new ShaderPass(vignetteShader);
composer.addPass(vignettePass);

/* ------------------------------------------------------------------ *
 *  GUI controls
 * ------------------------------------------------------------------ */
const params = {
  rotationSpeed: 1.0,
  diskSize: 1.0,
  bloomStrength: bloomPass.strength,
  bloomRadius: bloomPass.radius,
  lensing: lensingUniforms.uStrength.value,
  autoRotate: true,
  cameraRotate: controls.autoRotateSpeed
};

const gui = new GUI({ title: 'Singularity Controls' });

const fDisk = gui.addFolder('Accretion Disk');
fDisk.add(params, 'rotationSpeed', 0.0, 4.0, 0.01).name('Spin Speed')
  .onChange(v => diskUniforms.uSpeed.value = v);
fDisk.add(params, 'diskSize', 0.3, 2.5, 0.01).name('Particle Size')
  .onChange(v => diskUniforms.uSizeScale.value = v);

const fBloom = gui.addFolder('Bloom');
fBloom.add(params, 'bloomStrength', 0.0, 3.0, 0.01).name('Strength')
  .onChange(v => bloomPass.strength = v);
fBloom.add(params, 'bloomRadius', 0.0, 1.5, 0.01).name('Radius')
  .onChange(v => bloomPass.radius = v);

const fLens = gui.addFolder('Lensing');
fLens.add(params, 'lensing', 0.0, 1.5, 0.01).name('Warp Strength')
  .onChange(v => lensingUniforms.uStrength.value = v);

const fCam = gui.addFolder('Camera');
fCam.add(params, 'autoRotate').name('Auto Orbit')
  .onChange(v => controls.autoRotate = v);
fCam.add(params, 'cameraRotate', 0.0, 1.5, 0.01).name('Orbit Speed')
  .onChange(v => controls.autoRotateSpeed = v);

/* ------------------------------------------------------------------ *
 *  Resize handling
 * ------------------------------------------------------------------ */
function onResize() {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
  bloomPass.setSize(w, h);
  diskUniforms.uPixelRatio.value = renderer.getPixelRatio();
}
window.addEventListener('resize', onResize);

/* ------------------------------------------------------------------ *
 *  Animation loop
 * ------------------------------------------------------------------ */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  diskUniforms.uTime.value = t;
  lensingUniforms.uTime.value = t;

  // gentle disk-plane breathing on the inner ember ring
  innerGlow.material.opacity = 0.28 + Math.sin(t * 1.5) * 0.08;

  controls.update();
  composer.render();
}

/* Hide loader once first frame is ready */
function start() {
  animate();
  const loader = document.getElementById('loader');
  requestAnimationFrame(() => {
    loader.classList.add('hidden');
    setTimeout(() => loader.remove(), 1000);
  });
}
start();
</script>
</body>
</html>
