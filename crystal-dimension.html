    l.classList.remove('hidden');
    console.error('CAUGHT', e.error || e.message, e.filename, e.lineno, e.colno);

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';
import { GUI } from 'lil-gui';

/* ------------------------------------------------------------------ *
 *  Renderer / scene / camera
 * ------------------------------------------------------------------ */
const container = document.getElementById('app');

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05021c, 0.014);

const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.05, 400);

/* ------------------------------------------------------------------ *
 *  Seeded RNG
 * ------------------------------------------------------------------ */
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

/* ------------------------------------------------------------------ *
 *  Procedural nebula background (used as scene background)
 * ------------------------------------------------------------------ */
function makeNebulaTexture(w = 1600, h = 800) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0.0, '#050218');
  g.addColorStop(0.5, '#0a0420');
  g.addColorStop(1.0, '#020110');
  ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);

  const cols = ['#2a1862', '#1a2a6c', '#3a1a55', '#150e3a'];
  for (let i = 0; i < 30; i++) {
    const x = Math.random() * w, y = Math.random() * h, r = 100 + Math.random() * 280;
    const rg = ctx.createRadialGradient(x, y, 0, x, y, r);
    rg.addColorStop(0, cols[(Math.random() * cols.length) | 0]);
    rg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.globalAlpha = 0.08 + Math.random() * 0.1;
    ctx.fillStyle = rg;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  for (let i = 0; i < 900; i++) {
    const x = Math.random() * w, y = Math.random() * h, r = Math.random() * 1.1;
    const a = 0.2 + Math.random() * 0.6;
    ctx.fillStyle = `rgba(210,200,255,${a})`;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.mapping = THREE.EquirectangularReflectionMapping;
  return tex;
}
scene.background = makeNebulaTexture();

/* ------------------------------------------------------------------ *
 *  GLSL noise (Ashima 3D simplex) shared by all crystal shaders
 * ------------------------------------------------------------------ */
const GLSL_NOISE = /* glsl */`
vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){
  const vec2 C=vec2(1.0/6.0,1.0/3.0); const vec4 D=vec4(0.0,0.5,1.0,2.0);
  vec3 i=floor(v+dot(v,C.yyy)); vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz); vec3 l=1.0-g; vec3 i1=min(g.xyz,l.zxy); vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx; vec3 x2=x0-i2+C.yyy; vec3 x3=x0-D.yyy;
  i=mod289(i);
  vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
  float n_=0.142857142857; vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.0*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z); vec4 y_=floor(j-7.0*x_);
  vec4 x=x_*ns.x+ns.yyyy; vec4 y=y_*ns.x+ns.yyyy; vec4 h=1.0-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy); vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.0+1.0; vec4 s1=floor(b1)*2.0+1.0; vec4 sh=-step(h,vec4(0.0));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy; vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x); vec3 p1=vec3(a0.zw,h.y); vec3 p2=vec3(a1.xy,h.z); vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x; p1*=norm.y; p2*=norm.z; p3*=norm.w;
  vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0); m=m*m;
  return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}`;

/* ------------------------------------------------------------------ *
 *  Cube render target — captures inter-crystal reflections / refraction env
 * ------------------------------------------------------------------ */
const cubeRT = new THREE.WebGLCubeRenderTarget(128, {
  format: THREE.RGBAFormat, generateMipmaps: true, minFilter: THREE.LinearMipmapLinearFilter
});
const cubeCamera = new THREE.CubeCamera(0.2, 250, cubeRT);
scene.add(cubeCamera);

/* ------------------------------------------------------------------ *
 *  Shared crystal shader uniforms
 * ------------------------------------------------------------------ */
const sharedUniforms = {
  uTime:            { value: 0 },
  uEnvMap:          { value: cubeRT.texture },
  uMouseWorld:       { value: new THREE.Vector3(9999, 9999, 9999) },
  uResonanceRadius: { value: 7.5 },
  uColorDeep:       { value: new THREE.Color(0x070d38) },
  uColorGlow:       { value: new THREE.Color(0x7a3ccc) },
  uPulseSpeed:      { value: 1.3 }
};

function makeCrystalVertexShader(instanced) {
  return /* glsl */`
    ${instanced ? 'attribute float aSeed; attribute float aPhase; attribute float aHue;' : ''}
    uniform float uTime;
    uniform vec3 uMouseWorld;
    uniform float uResonanceRadius;
    varying vec3 vWorldPos;
    varying vec3 vWorldNormal;
    varying vec3 vViewDir;
    varying float vLocalY;
    varying float vResonance;
    varying float vPhase;
    varying float vHue;

    void main() {
      vec3 objPos = position;
      vLocalY = objPos.y;
      ${instanced ? `
      vPhase = aPhase;
      vHue = aHue;
      vec4 local = instanceMatrix * vec4(objPos, 1.0);
      vec3 n = normalize(mat3(instanceMatrix) * normal);
      ` : `
      vPhase = 0.0;
      vHue = 0.15;
      vec4 local = vec4(objPos, 1.0);
      vec3 n = normal;
      `}
      vec4 worldPos4 = modelMatrix * local;
      vec3 worldNormal = normalize(mat3(modelMatrix) * n);

      float distToMouse = length(worldPos4.xyz - uMouseWorld);
      float resonance = smoothstep(uResonanceRadius, 0.0, distToMouse);
      vResonance = resonance;
      worldPos4.xyz += worldNormal * resonance * (0.18 * sin(uTime * 6.0 + vPhase * 6.2831));

      vWorldPos = worldPos4.xyz;
      vWorldNormal = worldNormal;
      vViewDir = normalize(cameraPosition - worldPos4.xyz);
      gl_Position = projectionMatrix * viewMatrix * worldPos4;
    }
  `;
}

function makeCrystalFragmentShader(opacity) {
  return /* glsl */`
    precision highp float;
    uniform float uTime;
    uniform samplerCube uEnvMap;
    uniform vec3 uColorDeep;
    uniform vec3 uColorGlow;
    uniform float uPulseSpeed;
    varying vec3 vWorldPos;
    varying vec3 vWorldNormal;
    varying vec3 vViewDir;
    varying float vLocalY;
    varying float vResonance;
    varying float vPhase;
    varying float vHue;

    ${GLSL_NOISE}

    void main() {
      vec3 N = normalize(vWorldNormal);
      vec3 V = normalize(vViewDir);
      float fresnel = pow(1.0 - max(dot(N, V), 0.0), 2.4);

      vec3 reflectDir = reflect(-V, N);
      vec3 refractR = refract(-V, N, 1.0 / 1.58);
      vec3 refractG = refract(-V, N, 1.0 / 1.52);
      vec3 refractB = refract(-V, N, 1.0 / 1.46);

      // env samples are clamped before reuse to keep the reflection/refraction
      // feedback loop (cube camera re-captures these same crystals) from
      // compounding brightness across update cycles
      vec3 reflCol = min(textureCube(uEnvMap, reflectDir).rgb, vec3(1.0));
      float rC = min(textureCube(uEnvMap, refractR).r, 1.0);
      float gC = min(textureCube(uEnvMap, refractG).g, 1.0);
      float bC = min(textureCube(uEnvMap, refractB).b, 1.0);
      vec3 refrCol = vec3(rC, gC, bC);

      vec3 baseColor = mix(uColorDeep, uColorGlow, vHue);

      float n1 = snoise(vWorldPos * 0.4 + vec3(0.0, uTime * 0.3, 0.0));
      float n2 = snoise(vWorldPos * 0.9 - vec3(uTime * 0.18, 0.0, 0.0));
      float caustic = smoothstep(0.1, 0.95, n1 * 0.6 + n2 * 0.4);

      float pulse = pow(0.5 + 0.5 * sin(vLocalY * 3.2 - uTime * uPulseSpeed * 4.0 + vPhase * 6.2831), 7.0);

      vec3 glow = baseColor * (0.22 + caustic * 0.3) + uColorGlow * pulse * 0.55;
      vec3 surface = mix(refrCol * 0.4 + baseColor * 0.18, reflCol * 0.4, fresnel * 0.5);

      vec3 color = surface * 0.5 + glow * 0.5;
      color += uColorGlow * vResonance * 0.85;
      color += vec3(0.6, 0.7, 1.0) * fresnel * 0.12;
      color = min(color, vec3(1.4));

      gl_FragColor = vec4(color, ${opacity});
    }
  `;
}

function makeCrystalMaterial({ instanced, opacity, transparent }) {
  return new THREE.ShaderMaterial({
    uniforms: sharedUniforms,
    vertexShader: makeCrystalVertexShader(instanced),
    fragmentShader: makeCrystalFragmentShader(opacity.toFixed(2)),
    transparent,
    depthWrite: !transparent || opacity > 0.9,
    side: THREE.DoubleSide
  });
}

/* ------------------------------------------------------------------ *
 *  Procedural crystal growth algorithm
 *  A seed crystal (faceted bipyramid) sprouts child crystals recursively
 *  at randomized attachment points/angles -> a unique formation cluster.
 * ------------------------------------------------------------------ */
function makeBipyramidGeometry(rng, radius, height) {
  const sides = 5 + Math.floor(rng() * 3); // 5..7 facets
  const hTop = height * (0.55 + rng() * 0.35);
  const hBot = height * (0.45 + rng() * 0.35);
  const ring = [];
  for (let i = 0; i < sides; i++) {
    const a = (i / sides) * Math.PI * 2 + rng() * 0.18;
    const r = radius * (0.65 + rng() * 0.55);
    ring.push([Math.cos(a) * r, 0, Math.sin(a) * r]);
  }
  const top = [0, hTop * (0.8 + rng() * 0.35), 0];
  const bot = [0, -hBot * (0.8 + rng() * 0.35), 0];
  const positions = [];
  for (let i = 0; i < sides; i++) {
    const a = ring[i], b = ring[(i + 1) % sides];
    positions.push(...top, ...a, ...b);
    positions.push(...bot, ...b, ...a);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.computeVertexNormals();
  return geo;
}

function growCrystalCluster(seed, depth = 1) {
  const rng = mulberry32(seed);
  const baseHeight = 1.5 + rng() * 0.9;
  const baseRadius = 0.32 + rng() * 0.2;
  const parts = [makeBipyramidGeometry(rng, baseRadius, baseHeight)];

  function sprout(parentHeight, parentRadius, originY, level) {
    if (level <= 0) return;
    const count = 2 + Math.floor(rng() * 3);
    for (let c = 0; c < count; c++) {
      const t = rng();
      const yPos = THREE.MathUtils.lerp(-parentHeight * 0.35, parentHeight * 0.85, t) + originY;
      const ang = rng() * Math.PI * 2;
      const outR = parentRadius * (0.7 + rng() * 0.4);
      const ox = Math.cos(ang) * outR, oz = Math.sin(ang) * outR;
      const childH = parentHeight * (0.3 + rng() * 0.35);
      const childR = parentRadius * (0.25 + rng() * 0.3);
      const childGeo = makeBipyramidGeometry(rng, childR, childH);
      const tilt = (rng() - 0.5) * 1.2;
      const q = new THREE.Quaternion().setFromEuler(new THREE.Euler(tilt, ang, (rng() - 0.5) * 0.7));
      const m = new THREE.Matrix4().compose(new THREE.Vector3(ox, yPos, oz), q, new THREE.Vector3(1, 1, 1));
      childGeo.applyMatrix4(m);
      parts.push(childGeo);
      if (level > 1 && rng() > 0.5) sprout(childH, childR, yPos, level - 1);
    }
  }
  sprout(baseHeight, baseRadius, 0, depth);

  const merged = mergeGeometries(parts, false);
  merged.computeBoundingSphere();
  return merged;
}

const NUM_VARIANTS = 6;
const variantGeometries = [];
for (let v = 0; v < NUM_VARIANTS; v++) {
  variantGeometries.push(growCrystalCluster(1000 + v * 777, v % 3 === 0 ? 2 : 1));
}

/* ------------------------------------------------------------------ *
 *  Procedural cave generation — a winding crystalline tunnel
 * ------------------------------------------------------------------ */
const pathPoints = [];
const PATH_N = 16;
for (let i = 0; i < PATH_N; i++) {
  const t = i / PATH_N;
  const x = Math.sin(t * Math.PI * 2 * 1.0) * 42 + Math.sin(t * Math.PI * 2 * 3.0) * 13;
  const y = Math.cos(t * Math.PI * 2 * 2.0) * 16 + Math.sin(t * Math.PI * 2 * 5.0) * 6;
  const z = Math.cos(t * Math.PI * 2 * 1.0) * 42 + Math.cos(t * Math.PI * 2 * 4.0) * 15;
  pathPoints.push(new THREE.Vector3(x, y, z));
}
const pathCurve = new THREE.CatmullRomCurve3(pathPoints, true, 'catmullrom', 0.5);

function tunnelRadius(t) {
  return 8.5 + Math.sin(t * Math.PI * 2 * 3.0 + 1.3) * 1.6 + Math.sin(t * Math.PI * 2 * 7.0 + 4.1) * 0.8;
}

const facetRng = mulberry32(42);
const facetPhase = [];
for (let i = 0; i < 8; i++) facetPhase.push(facetRng() * Math.PI * 2);
function facetNoise(t, a) {
  return (
    Math.sin(a * 5 + t * 30 + facetPhase[0]) * 0.5 +
    Math.sin(a * 9 - t * 18 + facetPhase[1]) * 0.3 +
    Math.sin(a * 3 + t * 60 + facetPhase[2]) * 0.4
  );
}

function buildCaveGeometry() {
  const RES_ALONG = 260;
  const RES_AROUND = 13;
  let up = new THREE.Vector3(0.3, 1, 0.1).normalize();
  const frames = [];
  for (let i = 0; i <= RES_ALONG; i++) {
    const t = i / RES_ALONG;
    const tangent = pathCurve.getTangentAt(t % 1 < 0 ? 0 : (t >= 1 ? 0.9999 : t));
    let normal = up.clone().sub(tangent.clone().multiplyScalar(up.dot(tangent)));
    if (normal.lengthSq() < 1e-6) normal = new THREE.Vector3(1, 0, 0);
    normal.normalize();
    const binormal = new THREE.Vector3().crossVectors(tangent, normal).normalize();
    up = normal;
    frames.push({ t, point: pathCurve.getPointAt(t >= 1 ? 0.9999 : t), normal, binormal });
  }

  const positions = [];
  for (let i = 0; i < RES_ALONG; i++) {
    const f0 = frames[i], f1 = frames[i + 1];
    for (let j = 0; j < RES_AROUND; j++) {
      const a0 = (j / RES_AROUND) * Math.PI * 2;
      const a1 = ((j + 1) / RES_AROUND) * Math.PI * 2;
      const r00 = tunnelRadius(f0.t) + facetNoise(f0.t, a0);
      const r01 = tunnelRadius(f0.t) + facetNoise(f0.t, a1);
      const r10 = tunnelRadius(f1.t) + facetNoise(f1.t, a0);
      const r11 = tunnelRadius(f1.t) + facetNoise(f1.t, a1);

      const v00 = f0.point.clone().addScaledVector(f0.normal, Math.cos(a0) * r00).addScaledVector(f0.binormal, Math.sin(a0) * r00);
      const v01 = f0.point.clone().addScaledVector(f0.normal, Math.cos(a1) * r01).addScaledVector(f0.binormal, Math.sin(a1) * r01);
      const v10 = f1.point.clone().addScaledVector(f1.normal, Math.cos(a0) * r10).addScaledVector(f1.binormal, Math.sin(a0) * r10);
      const v11 = f1.point.clone().addScaledVector(f1.normal, Math.cos(a1) * r11).addScaledVector(f1.binormal, Math.sin(a1) * r11);

      // winding flipped so normals face inward (camera travels inside the tunnel)
      positions.push(v00.x, v00.y, v00.z, v11.x, v11.y, v11.z, v10.x, v10.y, v10.z);
      positions.push(v00.x, v00.y, v00.z, v01.x, v01.y, v01.z, v11.x, v11.y, v11.z);
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.computeVertexNormals();
  return { geo, frames };
}

const { geo: caveGeo, frames: caveFrames } = buildCaveGeometry();
const caveMaterial = makeCrystalMaterial({ instanced: false, opacity: 1.0, transparent: false });
const caveMesh = new THREE.Mesh(caveGeo, caveMaterial);
scene.add(caveMesh);

/* ------------------------------------------------------------------ *
 *  Instanced wall crystals — thousands, grown along the cavern walls
 * ------------------------------------------------------------------ */
const placeRng = mulberry32(2024);
const WALL_COUNT = 2600;
const wallGroups = Array.from({ length: NUM_VARIANTS }, () => []);

for (let i = 0; i < WALL_COUNT; i++) {
  const t = placeRng();
  const fi = Math.min(caveFrames.length - 2, Math.floor(t * caveFrames.length));
  const f = caveFrames[fi];
  const angle = placeRng() * Math.PI * 2;
  const r = tunnelRadius(f.t) + facetNoise(f.t, angle);
  const radial = f.normal.clone().multiplyScalar(Math.cos(angle) * r).add(f.binormal.clone().multiplyScalar(Math.sin(angle) * r));
  const pos = f.point.clone().add(radial.clone().multiplyScalar(0.95));
  const inward = radial.clone().normalize().multiplyScalar(-1);

  const q = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), inward);
  q.multiply(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), placeRng() * Math.PI * 2));

  const scale = 0.5 + Math.pow(placeRng(), 1.6) * 2.3;
  const m = new THREE.Matrix4().compose(pos, q, new THREE.Vector3(scale, scale, scale));

  const variant = Math.floor(placeRng() * NUM_VARIANTS);
  wallGroups[variant].push({
    matrix: m,
    seed: placeRng(),
    phase: placeRng(),
    hue: placeRng() < 0.5 ? placeRng() * 0.3 : 0.6 + placeRng() * 0.4
  });
}

const wallMaterial = makeCrystalMaterial({ instanced: true, opacity: 0.78, transparent: true });
const wallMeshes = [];
wallGroups.forEach((group, idx) => {
  if (!group.length) return;
  const mesh = new THREE.InstancedMesh(variantGeometries[idx], wallMaterial, group.length);
  const seeds = new Float32Array(group.length);
  const phases = new Float32Array(group.length);
  const hues = new Float32Array(group.length);
  group.forEach((inst, i) => {
    mesh.setMatrixAt(i, inst.matrix);
    seeds[i] = inst.seed; phases[i] = inst.phase; hues[i] = inst.hue;
  });
  mesh.geometry.setAttribute('aSeed', new THREE.InstancedBufferAttribute(seeds, 1));
  mesh.geometry.setAttribute('aPhase', new THREE.InstancedBufferAttribute(phases, 1));
  mesh.geometry.setAttribute('aHue', new THREE.InstancedBufferAttribute(hues, 1));
  mesh.instanceMatrix.needsUpdate = true;
  scene.add(mesh);
  wallMeshes.push(mesh);
});

/* ------------------------------------------------------------------ *
 *  Floating crystal shards — drift slowly through the open cavern air
 * ------------------------------------------------------------------ */
const FLOAT_COUNT = 700;
const floatData = [];
const floatRng = mulberry32(7777);
for (let i = 0; i < FLOAT_COUNT; i++) {
  const t = floatRng();
  const fi = Math.min(caveFrames.length - 2, Math.floor(t * caveFrames.length));
  const f = caveFrames[fi];
  const maxR = tunnelRadius(f.t) * 0.7;
  const angle = floatRng() * Math.PI * 2;
  const rr = floatRng() * maxR;
  const radial = f.normal.clone().multiplyScalar(Math.cos(angle) * rr).add(f.binormal.clone().multiplyScalar(Math.sin(angle) * rr));
  const basePos = f.point.clone().add(radial);
  floatData.push({
    base: basePos,
    variant: Math.floor(floatRng() * NUM_VARIANTS),
    seed: floatRng(),
    phase: floatRng(),
    hue: floatRng(),
    scale: 0.15 + floatRng() * 0.4,
    driftAxis: new THREE.Vector3(floatRng() - 0.5, floatRng() - 0.5, floatRng() - 0.5).normalize(),
    spinAxis: new THREE.Vector3(floatRng() - 0.5, floatRng() - 0.5, floatRng() - 0.5).normalize(),
    spinSpeed: 0.2 + floatRng() * 0.6
  });
}
const floatGroups = Array.from({ length: NUM_VARIANTS }, () => []);
floatData.forEach((d) => floatGroups[d.variant].push(d));

const floatMaterial = makeCrystalMaterial({ instanced: true, opacity: 0.62, transparent: true });
const floatMeshes = [];
const dummy = new THREE.Object3D();
floatGroups.forEach((group, idx) => {
  if (!group.length) return;
  const mesh = new THREE.InstancedMesh(variantGeometries[idx], floatMaterial, group.length);
  const seeds = new Float32Array(group.length);
  const phases = new Float32Array(group.length);
  const hues = new Float32Array(group.length);
  group.forEach((d, i) => { seeds[i] = d.seed; phases[i] = d.phase; hues[i] = d.hue; });
  mesh.geometry.setAttribute('aSeed', new THREE.InstancedBufferAttribute(seeds, 1));
  mesh.geometry.setAttribute('aPhase', new THREE.InstancedBufferAttribute(phases, 1));
  mesh.geometry.setAttribute('aHue', new THREE.InstancedBufferAttribute(hues, 1));
  mesh.userData.group = group;
  scene.add(mesh);
  floatMeshes.push(mesh);
});

/* ------------------------------------------------------------------ *
 *  Ambient floating particles + mist
 * ------------------------------------------------------------------ */
const PARTICLE_COUNT = 3500;
const pPos = new Float32Array(PARTICLE_COUNT * 3);
const pSeed = new Float32Array(PARTICLE_COUNT);
const pRng = mulberry32(99);
for (let i = 0; i < PARTICLE_COUNT; i++) {
  const t = pRng();
  const fi = Math.min(caveFrames.length - 2, Math.floor(t * caveFrames.length));
  const f = caveFrames[fi];
  const maxR = tunnelRadius(f.t) * 0.9;
  const angle = pRng() * Math.PI * 2;
  const rr = pRng() * maxR;
  const radial = f.normal.clone().multiplyScalar(Math.cos(angle) * rr).add(f.binormal.clone().multiplyScalar(Math.sin(angle) * rr));
  const pos = f.point.clone().add(radial);
  pPos[i * 3] = pos.x; pPos[i * 3 + 1] = pos.y; pPos[i * 3 + 2] = pos.z;
  pSeed[i] = pRng() * 1000;
}
const particleGeo = new THREE.BufferGeometry();
particleGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
particleGeo.setAttribute('aSeed', new THREE.BufferAttribute(pSeed, 1));

const particleMaterial = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 }, uColor: { value: new THREE.Color(0xb89dff) } },
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
  vertexShader: /* glsl */`
    attribute float aSeed;
    uniform float uTime;
    varying float vAlpha;
    void main() {
      vec3 p = position;
      p.x += sin(uTime * 0.3 + aSeed) * 1.4;
      p.y += sin(uTime * 0.22 + aSeed * 1.7) * 1.1 + uTime * 0.15;
      p.z += cos(uTime * 0.25 + aSeed * 0.6) * 1.4;
      p.y = mod(p.y + 40.0, 80.0) - 40.0;
      vec4 mv = modelViewMatrix * vec4(p, 1.0);
      gl_Position = projectionMatrix * mv;
      gl_PointSize = (60.0 / -mv.z) * (0.4 + 0.6 * fract(sin(aSeed) * 4391.2));
      vAlpha = 0.4 + 0.5 * sin(uTime * 0.6 + aSeed * 3.1);
    }
  `,
  fragmentShader: /* glsl */`
    uniform vec3 uColor;
    varying float vAlpha;
    void main() {
      float d = length(gl_PointCoord - vec2(0.5));
      float a = smoothstep(0.5, 0.0, d) * vAlpha * 0.55;
      gl_FragColor = vec4(uColor, a);
    }
  `
});
const particles = new THREE.Points(particleGeo, particleMaterial);
scene.add(particles);

/* ------------------------------------------------------------------ *
 *  Postprocessing — bloom for the glow of living crystal
 * ------------------------------------------------------------------ */
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.85, 0.55, 0.6);
composer.addPass(bloomPass);

/* ------------------------------------------------------------------ *
 *  Mouse interaction -> resonance point in world space
 * ------------------------------------------------------------------ */
const raycaster = new THREE.Raycaster();
const mouseNDC = new THREE.Vector2(0, 0);
const mouseWorld = new THREE.Vector3(9999, 9999, 9999);
window.addEventListener('mousemove', (e) => {
  mouseNDC.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouseNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

/* ------------------------------------------------------------------ *
 *  Camera flight through the cavern
 * ------------------------------------------------------------------ */
const flightParams = { speed: 0.0065, lookAhead: 0.012, parallax: 2.2 };
let flightT = 0;

/* ------------------------------------------------------------------ *
 *  GUI
 * ------------------------------------------------------------------ */
const gui = new GUI({ title: 'Crystal Dimension' });
gui.add(flightParams, 'speed', 0.0005, 0.02, 0.0005).name('Flight Speed');
gui.add(bloomPass, 'strength', 0, 3, 0.05).name('Bloom Strength');
gui.add(bloomPass, 'radius', 0, 1.5, 0.05).name('Bloom Radius');
gui.add(sharedUniforms.uPulseSpeed, 'value', 0, 4, 0.05).name('Pulse Speed');
gui.add(sharedUniforms.uResonanceRadius, 'value', 1, 20, 0.5).name('Resonance Radius');
gui.add(scene.fog, 'density', 0, 0.05, 0.001).name('Mist Density');

/* ------------------------------------------------------------------ *
 *  Animation loop
 * ------------------------------------------------------------------ */
const clock = new THREE.Clock();
let frameCount = 0;

function updateFloatingShards(time) {
  floatMeshes.forEach((mesh) => {
    const group = mesh.userData.group;
    for (let i = 0; i < group.length; i++) {
      const d = group[i];
      const drift = d.driftAxis.clone().multiplyScalar(Math.sin(time * 0.25 + d.seed * 10.0) * 1.6);
      const pos = d.base.clone().add(drift);
      const q = new THREE.Quaternion().setFromAxisAngle(d.spinAxis, time * d.spinSpeed + d.seed * 6.0);
      dummy.position.copy(pos);
      dummy.quaternion.copy(q);
      dummy.scale.setScalar(d.scale);
      dummy.updateMatrix();
      mesh.setMatrixAt(i, dummy.matrix);
    }
    mesh.instanceMatrix.needsUpdate = true;
  });
}

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const time = clock.elapsedTime;
  frameCount++;

  // camera flight along the procedural cave curve
  flightT = (flightT + flightParams.speed * dt * 60) % 1;
  const lookT = (flightT + flightParams.lookAhead) % 1;
  const pos = pathCurve.getPointAt(flightT);
  const lookPos = pathCurve.getPointAt(lookT);
  camera.position.copy(pos);

  raycaster.setFromCamera(mouseNDC, camera);
  const offset = raycaster.ray.direction.clone().multiplyScalar(0);
  const targetLook = lookPos.clone();
  targetLook.x += mouseNDC.x * flightParams.parallax;
  targetLook.y += mouseNDC.y * flightParams.parallax;
  camera.lookAt(targetLook);

  // resonance point: a fixed distance along the mouse ray from the camera
  mouseWorld.copy(raycaster.ray.origin).addScaledVector(raycaster.ray.direction, 14);
  sharedUniforms.uMouseWorld.value.copy(mouseWorld);
  sharedUniforms.uTime.value = time;
  particleMaterial.uniforms.uTime.value = time;

  updateFloatingShards(time);

  // periodically refresh the reflection/refraction cubemap
  if (frameCount % 4 === 0) {
    cubeCamera.position.copy(camera.position);
    caveMesh.visible = true;
    cubeCamera.update(renderer, scene);
  }

  composer.render();
}

/* ------------------------------------------------------------------ *
 *  Resize + boot
 * ------------------------------------------------------------------ */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  bloomPass.setSize(window.innerWidth, window.innerHeight);
});

cubeCamera.position.copy(pathCurve.getPointAt(0));
cubeCamera.update(renderer, scene);

document.getElementById('loader').classList.add('hidden');
animate();
</script>
</body>
</html>
