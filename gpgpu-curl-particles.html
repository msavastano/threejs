<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GPGPU Curl-Noise Particles — 250,000 on the GPU</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #05060a; overflow: hidden; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }
  #hud {
    position: fixed; left: 16px; top: 14px; z-index: 10;
    font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color: #9fb3d1; letter-spacing: .02em; pointer-events: none;
    text-shadow: 0 1px 2px rgba(0,0,0,.8);
  }
  #hud b { color: #e9f0ff; font-weight: 600; }
  #hud .dim { color: #5f7193; }
  #fps { color: #79f2c0; }
</style>
</head>
<body>
<div id="app"></div>
<div id="hud">
  <div><b>GPGPU Curl-Noise Flow Field</b></div>
  <div><span class="dim">particles</span> <b>250,000</b> &middot; physics on GPU (FBO ping-pong)</div>
  <div><span class="dim">fps</span> <span id="fps">—</span> &middot; <span class="dim">drag to orbit, move mouse to repel</span></div>
</div>

<!-- Modern ES6 modules via import map -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GPUComputationRenderer } from 'three/addons/misc/GPUComputationRenderer.js';

/* ============================================================================
 *  CONFIG
 * ========================================================================== */
const SIM_WIDTH  = 500;                       // texture edge → 500 * 500 =
const PARTICLES  = SIM_WIDTH * SIM_WIDTH;     // 250,000 particles
const SPAWN_RADIUS = 8.0;

/* ============================================================================
 *  SHADER STRINGS (kept as separate, clearly-defined constants)
 * ========================================================================== */

/* --- Shared GLSL: Ashima 3D simplex noise + analytic curl ----------------- */
const NOISE_GLSL = /* glsl */`
vec3 mod289(vec3 x){ return x - floor(x * (1.0/289.0)) * 289.0; }
vec4 mod289(vec4 x){ return x - floor(x * (1.0/289.0)) * 289.0; }
vec4 permute(vec4 x){ return mod289(((x*34.0)+1.0)*x); }
vec4 taylorInvSqrt(vec4 r){ return 1.79284291400159 - 0.85373472095314 * r; }

float snoise(vec3 v){
  const vec2  C = vec2(1.0/6.0, 1.0/3.0);
  const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
  vec3 i  = floor(v + dot(v, C.yyy));
  vec3 x0 = v - i + dot(i, C.xxx);
  vec3 g  = step(x0.yzx, x0.xyz);
  vec3 l  = 1.0 - g;
  vec3 i1 = min(g.xyz, l.zxy);
  vec3 i2 = max(g.xyz, l.zxy);
  vec3 x1 = x0 - i1 + C.xxx;
  vec3 x2 = x0 - i2 + C.yyy;
  vec3 x3 = x0 - D.yyy;
  i = mod289(i);
  vec4 p = permute( permute( permute(
             i.z + vec4(0.0, i1.z, i2.z, 1.0))
           + i.y + vec4(0.0, i1.y, i2.y, 1.0))
           + i.x + vec4(0.0, i1.x, i2.x, 1.0));
  float n_ = 0.142857142857;
  vec3 ns = n_ * D.wyz - D.xzx;
  vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
  vec4 x_ = floor(j * ns.z);
  vec4 y_ = floor(j - 7.0 * x_);
  vec4 x = x_ * ns.x + ns.yyyy;
  vec4 y = y_ * ns.x + ns.yyyy;
  vec4 h = 1.0 - abs(x) - abs(y);
  vec4 b0 = vec4(x.xy, y.xy);
  vec4 b1 = vec4(x.zw, y.zw);
  vec4 s0 = floor(b0)*2.0 + 1.0;
  vec4 s1 = floor(b1)*2.0 + 1.0;
  vec4 sh = -step(h, vec4(0.0));
  vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
  vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
  vec3 p0 = vec3(a0.xy, h.x);
  vec3 p1 = vec3(a0.zw, h.y);
  vec3 p2 = vec3(a1.xy, h.z);
  vec3 p3 = vec3(a1.zw, h.w);
  vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
  p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
  vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
  m = m * m;
  return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
}

// Vector-valued noise: sample the scalar field at decorrelated offsets.
vec3 snoiseVec3(vec3 x){
  return vec3(
    snoise(x),
    snoise(vec3(x.y - 19.1, x.z + 33.4, x.x + 47.2)),
    snoise(vec3(x.z + 74.2, x.x - 124.5, x.y + 99.4))
  );
}

// Analytic curl of the noise field → divergence-free flow (no sources/sinks).
vec3 curlNoise(vec3 p){
  const float e = 0.1;
  vec3 dx = vec3(e, 0.0, 0.0);
  vec3 dy = vec3(0.0, e, 0.0);
  vec3 dz = vec3(0.0, 0.0, e);
  vec3 p_x0 = snoiseVec3(p - dx), p_x1 = snoiseVec3(p + dx);
  vec3 p_y0 = snoiseVec3(p - dy), p_y1 = snoiseVec3(p + dy);
  vec3 p_z0 = snoiseVec3(p - dz), p_z1 = snoiseVec3(p + dz);
  float x = (p_y1.z - p_y0.z) - (p_z1.y - p_z0.y);
  float y = (p_z1.x - p_z0.x) - (p_x1.z - p_x0.z);
  float z = (p_x1.y - p_x0.y) - (p_y1.x - p_y0.x);
  return vec3(x, y, z) / (2.0 * e);
}
`;

/* --- COMPUTE: velocity update (curl field + center pull + mouse repulsor) -- */
const SIM_VELOCITY_SHADER = NOISE_GLSL + /* glsl */`
uniform float uTime;
uniform float uDelta;
uniform float uNoiseScale;
uniform float uNoiseSpeed;
uniform vec3  uMouse;
uniform float uMouseStrength;
uniform float uMouseRadius;

void main(){
  vec2 uv = gl_FragCoord.xy / resolution.xy;
  vec3 pos = texture2D(texturePosition, uv).xyz;
  vec3 vel = texture2D(textureVelocity, uv).xyz;

  // 1. Curl-noise flow field, slowly evolving through the 4th (time) axis.
  vec3 flow = curlNoise(pos * uNoiseScale + vec3(0.0, 0.0, uTime * uNoiseSpeed));
  vel += flow * uDelta * 6.0;

  // 2. Weak pull toward origin so the cloud stays bounded → chaotic attractor.
  vel += -pos * uDelta * 0.35;

  // 3. Interactive repulsor: push particles away from the mouse-projected point.
  vec3 away = pos - uMouse;
  float dist = length(away);
  if (dist < uMouseRadius){
    float f = 1.0 - dist / uMouseRadius;     // 0 at edge → 1 at center
    vel += normalize(away + 1e-5) * f * f * uMouseStrength * uDelta;
  }

  // 4. Damping for stability.
  vel *= 0.95;

  gl_FragColor = vec4(vel, 1.0);
}
`;

/* --- COMPUTE: position integration ---------------------------------------- */
const SIM_POSITION_SHADER = /* glsl */`
uniform float uDelta;

void main(){
  vec2 uv = gl_FragCoord.xy / resolution.xy;
  vec3 pos = texture2D(texturePosition, uv).xyz;
  vec3 vel = texture2D(textureVelocity, uv).xyz;
  pos += vel * uDelta;
  gl_FragColor = vec4(pos, 1.0);
}
`;

/* --- RENDER: vertex (read FBO, velocity → color) -------------------------- */
const RENDER_VERTEX_SHADER = /* glsl */`
uniform sampler2D texturePosition;
uniform sampler2D textureVelocity;
uniform float uPointSize;
uniform float uSpeedScale;
attribute vec2 ref;            // this particle's texel coordinate
varying vec3 vColor;
varying float vFade;

void main(){
  vec3 pos = texture2D(texturePosition, ref).xyz;
  vec3 vel = texture2D(textureVelocity, ref).xyz;

  // Velocity → color: deep blue (slow) → magenta → bright white (fast).
  float t = clamp(length(vel) * uSpeedScale, 0.0, 1.0);
  vec3 blue    = vec3(0.02, 0.16, 0.85);
  vec3 magenta = vec3(0.95, 0.10, 0.75);
  vec3 white   = vec3(1.00, 1.00, 1.00);
  vColor = (t < 0.5)
    ? mix(blue,    magenta, t * 2.0)
    : mix(magenta, white,  (t - 0.5) * 2.0);
  vFade = 0.35 + 0.65 * t;     // faster particles glow brighter

  vec4 mv = modelViewMatrix * vec4(pos, 1.0);
  gl_PointSize = uPointSize * (300.0 / -mv.z);   // perspective-correct sizing
  gl_Position = projectionMatrix * mv;
}
`;

/* --- RENDER: fragment (soft round sprite, additive) ----------------------- */
const RENDER_FRAGMENT_SHADER = /* glsl */`
precision highp float;
varying vec3 vColor;
varying float vFade;

void main(){
  vec2 c = gl_PointCoord - 0.5;
  float d = dot(c, c);
  if (d > 0.25) discard;                        // clip to a circle
  float alpha = smoothstep(0.25, 0.0, d) * vFade;
  gl_FragColor = vec4(vColor, alpha);
}
`;

/* ============================================================================
 *  RENDERER / SCENE / CAMERA
 * ========================================================================== */
const container = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x05060a, 1);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 30);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.4;

/* ============================================================================
 *  GPGPU COMPUTE PIPELINE (FBO ping-pong)
 * ========================================================================== */
const gpu = new GPUComputationRenderer(SIM_WIDTH, SIM_WIDTH, renderer);
if (renderer.capabilities.isWebGL2 === false) gpu.setDataType(THREE.HalfFloatType);

const pos0 = gpu.createTexture();
const vel0 = gpu.createTexture();
(function seed(){
  const p = pos0.image.data;
  const v = vel0.image.data;
  for (let i = 0; i < PARTICLES; i++){
    // Uniform-ish distribution inside a sphere.
    const r = SPAWN_RADIUS * Math.cbrt(Math.random());
    const theta = Math.random() * Math.PI * 2.0;
    const phi = Math.acos(2.0 * Math.random() - 1.0);
    const s = Math.sin(phi);
    const k = i * 4;
    p[k+0] = r * s * Math.cos(theta);
    p[k+1] = r * s * Math.sin(theta);
    p[k+2] = r * Math.cos(phi);
    p[k+3] = 1.0;
    v[k+0] = v[k+1] = v[k+2] = 0.0; v[k+3] = 1.0;
  }
})();

const velVar = gpu.addVariable('textureVelocity', SIM_VELOCITY_SHADER, vel0);
const posVar = gpu.addVariable('texturePosition', SIM_POSITION_SHADER, pos0);
gpu.setVariableDependencies(velVar, [posVar, velVar]);
gpu.setVariableDependencies(posVar, [posVar, velVar]);

velVar.material.uniforms.uTime          = { value: 0 };
velVar.material.uniforms.uDelta         = { value: 0 };
velVar.material.uniforms.uNoiseScale    = { value: 0.18 };
velVar.material.uniforms.uNoiseSpeed    = { value: 0.6 };
velVar.material.uniforms.uMouse         = { value: new THREE.Vector3(1e3, 1e3, 1e3) };
velVar.material.uniforms.uMouseStrength = { value: 0.0 };
velVar.material.uniforms.uMouseRadius   = { value: 7.0 };
posVar.material.uniforms.uDelta         = { value: 0 };

velVar.wrapS = velVar.wrapT = THREE.RepeatWrapping;
posVar.wrapS = posVar.wrapT = THREE.RepeatWrapping;

const gpuErr = gpu.init();
if (gpuErr !== null) console.error('GPUComputationRenderer:', gpuErr);

/* ============================================================================
 *  POINTS + RENDER SHADER MATERIAL
 * ========================================================================== */
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(PARTICLES * 3);   // placeholder (real pos from FBO)
const refs = new Float32Array(PARTICLES * 2);
for (let i = 0; i < PARTICLES; i++){
  // Point at the texel CENTER (+0.5) so nearest-filtered FBO reads are exact.
  refs[i*2+0] = ((i % SIM_WIDTH) + 0.5) / SIM_WIDTH;
  refs[i*2+1] = (Math.floor(i / SIM_WIDTH) + 0.5) / SIM_WIDTH;
}
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('ref', new THREE.BufferAttribute(refs, 2));
geometry.setDrawRange(0, PARTICLES);

const renderMaterial = new THREE.ShaderMaterial({
  uniforms: {
    texturePosition: { value: null },
    textureVelocity: { value: null },
    uPointSize:      { value: 1.6 },
    uSpeedScale:     { value: 0.15 }   // lower = more blue; raise toward white
  },
  vertexShader: RENDER_VERTEX_SHADER,
  fragmentShader: RENDER_FRAGMENT_SHADER,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  depthTest: false
});

const points = new THREE.Points(geometry, renderMaterial);
points.frustumCulled = false;
scene.add(points);

/* ============================================================================
 *  MOUSE → WORLD-SPACE REPULSOR (raycasting onto a camera-facing plane)
 * ========================================================================== */
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2(0, 0);
const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0); // re-oriented each frame
const hit = new THREE.Vector3();
const camDir = new THREE.Vector3();
let mouseActive = false;
let mouseTimeout = null;

function onPointerMove(e){
  pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
  mouseActive = true;
  clearTimeout(mouseTimeout);
  mouseTimeout = setTimeout(() => { mouseActive = false; }, 250);
}
window.addEventListener('pointermove', onPointerMove);
window.addEventListener('pointerleave', () => { mouseActive = false; });

/* ============================================================================
 *  LOOP
 * ========================================================================== */
const clock = new THREE.Clock();
let fpsAcc = 0, fpsFrames = 0;
const fpsEl = document.getElementById('fps');

function tick(){
  requestAnimationFrame(tick);
  let dt = clock.getDelta();
  dt = Math.min(dt, 1 / 30);                 // clamp (e.g. after a tab switch)
  const elapsed = clock.elapsedTime;

  // Update repulsor position from the mouse ray ∩ camera-facing plane.
  if (mouseActive){
    camera.getWorldDirection(camDir);
    plane.normal.copy(camDir);
    plane.constant = 0;                       // plane through the origin
    raycaster.setFromCamera(pointer, camera);
    if (raycaster.ray.intersectPlane(plane, hit)){
      velVar.material.uniforms.uMouse.value.copy(hit);
    }
    velVar.material.uniforms.uMouseStrength.value = 90.0;
  } else {
    velVar.material.uniforms.uMouseStrength.value = 0.0;
  }

  // Advance the GPU simulation (ping-pong happens inside compute()).
  velVar.material.uniforms.uTime.value = elapsed;
  velVar.material.uniforms.uDelta.value = dt;
  posVar.material.uniforms.uDelta.value = dt;
  gpu.compute();

  // Feed the freshly-computed FBO textures into the render material.
  renderMaterial.uniforms.texturePosition.value = gpu.getCurrentRenderTarget(posVar).texture;
  renderMaterial.uniforms.textureVelocity.value = gpu.getCurrentRenderTarget(velVar).texture;

  controls.update();
  renderer.render(scene, camera);

  // FPS readout.
  fpsAcc += dt; fpsFrames++;
  if (fpsAcc >= 0.5){
    fpsEl.textContent = Math.round(fpsFrames / fpsAcc).toString();
    fpsAcc = 0; fpsFrames = 0;
  }
}
tick();

/* ============================================================================
 *  RESIZE
 * ========================================================================== */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
