<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bioluminescent Jellyfish</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #01060f; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  #ui {
    position: fixed;
    left: 50%;
    bottom: 32px;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    z-index: 10;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    user-select: none;
  }

  #audioBtn {
    appearance: none;
    cursor: pointer;
    padding: 12px 26px;
    font-size: 15px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #bff6ff;
    background: rgba(8, 24, 44, 0.55);
    border: 1px solid rgba(96, 220, 255, 0.45);
    border-radius: 999px;
    backdrop-filter: blur(6px);
    box-shadow: 0 0 24px rgba(40, 180, 255, 0.25), inset 0 0 12px rgba(40, 180, 255, 0.15);
    transition: transform 0.15s ease, box-shadow 0.25s ease, color 0.25s ease;
  }
  #audioBtn:hover {
    color: #ffffff;
    box-shadow: 0 0 36px rgba(80, 210, 255, 0.5), inset 0 0 16px rgba(80, 210, 255, 0.3);
    transform: translateY(-1px);
  }
  #audioBtn:active { transform: translateY(1px) scale(0.98); }

  #hint {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(150, 200, 230, 0.5);
  }

  #title {
    position: fixed;
    top: 26px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 13px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: rgba(150, 230, 255, 0.55);
    text-shadow: 0 0 18px rgba(40, 180, 255, 0.4);
    pointer-events: none;
  }
</style>

<!-- Three.js via importmap -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
  <div id="app"></div>
  <div id="title">Bioluminescent Jellyfish</div>
  <div id="ui">
    <button id="audioBtn">▶ Start Audio</button>
    <div id="hint">drag to orbit · scroll to zoom</div>
  </div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ----------------------------------------------------------------------------
   CONFIG
---------------------------------------------------------------------------- */
// Placeholder track URL — swap for a real same-origin / CORS-enabled MP3.
// If it fails to load, a generated ambient drone drives the analyser instead,
// so the experiment always reacts to "sound".
const TRACK_URL = 'https://example.com/your-bioluminescent-track.mp3';

const DEEP = new THREE.Color(0x02101e);   // deep ocean
const BELL_SEGMENTS = 96;

/* ----------------------------------------------------------------------------
   SCENE / CAMERA / RENDERER
---------------------------------------------------------------------------- */
const scene = new THREE.Scene();
scene.background = DEEP;
scene.fog = new THREE.FogExp2(0x02131f, 0.055);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 1.2, 9);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.getElementById('app').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 3.5;
controls.maxDistance = 22;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.45;
controls.target.set(0, -0.5, 0);

/* ----------------------------------------------------------------------------
   SHARED AUDIO UNIFORMS
   uBass / uTreble are smoothed scalars; uFreq[8] is a downsampled spectrum.
---------------------------------------------------------------------------- */
const audioUniforms = {
  uTime:   { value: 0 },
  uBass:   { value: 0 },
  uTreble: { value: 0 },
  uFreq:   { value: new Array(8).fill(0) }
};

/* ----------------------------------------------------------------------------
   THE BELL — SphereGeometry reshaped into a jellyfish bell in the vertex shader
---------------------------------------------------------------------------- */
const bellGeo = new THREE.SphereGeometry(1, BELL_SEGMENTS, BELL_SEGMENTS);

const bellMat = new THREE.ShaderMaterial({
  uniforms: audioUniforms,
  transparent: true,
  side: THREE.DoubleSide,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexShader: /* glsl */`
    uniform float uTime;
    uniform float uBass;
    uniform float uTreble;
    uniform float uFreq[8];

    varying vec3  vNormalW;
    varying vec3  vViewDir;
    varying float vPhi;
    varying float vRim;

    const float PI = 3.141592653589793;

    void main() {
      // Reconstruct spherical coords from the unit sphere vertex.
      vec3 sp = normalize(position);
      float phi = acos(clamp(sp.y, -1.0, 1.0)); // 0 = top, PI = bottom
      float az  = atan(sp.z, sp.x);

      // --- Bell profile -------------------------------------------------
      float radius = sin(phi);
      float height = cos(phi);

      // Flare the mid-body outward, then tuck the rim back under (umbrella).
      radius *= 1.0 + 0.28 * sin(phi);
      float tuck = smoothstep(2.15, PI, phi);
      radius *= 1.0 - 0.55 * tuck;
      height -= 0.35 * tuck;           // curl the rim downward
      height *= 0.9;                   // squash dome a touch

      // --- Scalloped rim driven by the downsampled spectrum -------------
      int band = int(floor((az + PI) / (2.0 * PI) * 8.0));
      band = clamp(band, 0, 7);
      float rimMask = smoothstep(0.35, 1.0, sin(phi));
      float scallop = sin(az * 9.0 + uTime * 1.5) * (0.05 + uTreble * 0.12);
      scallop += uFreq[band] * 0.10;
      radius *= 1.0 + scallop * rimMask;

      // --- Pumping: contract narrow + tall on bass, like a real swim ----
      float pump = uBass;
      radius *= 1.0 - 0.16 * pump;
      height *= 1.0 + 0.22 * pump;

      vec3 shaped = vec3(cos(az) * radius, height, sin(az) * radius);

      // Overall pulse / scale with bass.
      shaped *= 1.0 + uBass * 0.22;
      shaped *= 1.5; // base size

      // Approx normal for shading (good enough for a translucent body).
      vec3 nObj = normalize(shaped);
      vNormalW = normalize(mat3(modelMatrix) * nObj);

      vec4 worldPos = modelMatrix * vec4(shaped, 1.0);
      vViewDir = normalize(cameraPosition - worldPos.xyz);
      vPhi = phi;
      vRim = rimMask;

      gl_Position = projectionMatrix * viewMatrix * worldPos;
    }
  `,
  fragmentShader: /* glsl */`
    uniform float uTime;
    uniform float uBass;
    uniform float uTreble;

    varying vec3  vNormalW;
    varying vec3  vViewDir;
    varying float vPhi;
    varying float vRim;

    void main() {
      vec3 N = normalize(vNormalW);
      vec3 V = normalize(vViewDir);
      float fres = pow(1.0 - clamp(dot(N, V), 0.0, 1.0), 2.4);

      // Bioluminescent blue -> neon pink, pushed by treble.
      vec3 bio  = vec3(0.05, 0.62, 1.0);
      vec3 neon = vec3(1.0, 0.12, 0.66);
      vec3 base = mix(bio, neon, clamp(uTreble * 1.4, 0.0, 1.0));

      // Brighter toward the dome top, glowing inner core on bass.
      float topGlow = smoothstep(1.6, 0.0, vPhi);
      float glow = fres * 1.1 + 0.18 + uBass * 0.6 + topGlow * 0.25;

      // Pulsing emissive bands radiating down the bell.
      float bands = 0.5 + 0.5 * sin(vPhi * 14.0 - uTime * 3.0);
      glow += bands * (0.05 + uTreble * 0.18) * vRim;

      vec3 col = base * glow;
      float alpha = clamp(fres * 0.85 + 0.12 + uBass * 0.3, 0.0, 0.92);

      gl_FragColor = vec4(col, alpha);
    }
  `
});

const bell = new THREE.Mesh(bellGeo, bellMat);
scene.add(bell);

/* ----------------------------------------------------------------------------
   TENDRILS — LineSegments hanging from the rim, wiggling on treble
---------------------------------------------------------------------------- */
function buildTendrils() {
  const STRANDS = 84;
  const SEG = 40;
  const TOP_Y = -0.15;
  const LEN = 5.5;
  const RIM = 1.25;

  const positions = [];
  const aLen = [];     // 0 at rim -> 1 at tip
  const aPhase = [];   // per-strand phase
  const aAngle = [];   // azimuth around rim

  for (let s = 0; s < STRANDS; s++) {
    const ang = (s / STRANDS) * Math.PI * 2;
    const phase = s * 1.37;
    // Slight radius jitter so strands don't sit on a perfect ring.
    const r = RIM * (0.85 + 0.25 * Math.abs(Math.sin(s * 2.1)));
    const x = Math.cos(ang) * r;
    const z = Math.sin(ang) * r;

    for (let i = 0; i < SEG; i++) {
      const t0 = i / SEG;
      const t1 = (i + 1) / SEG;
      // Gentle inward taper toward the tip.
      const taper0 = 1.0 - 0.25 * t0;
      const taper1 = 1.0 - 0.25 * t1;

      positions.push(x * taper0, TOP_Y - t0 * LEN, z * taper0);
      positions.push(x * taper1, TOP_Y - t1 * LEN, z * taper1);
      aLen.push(t0, t1);
      aPhase.push(phase, phase);
      aAngle.push(ang, ang);
    }
  }

  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  g.setAttribute('aLen', new THREE.Float32BufferAttribute(aLen, 1));
  g.setAttribute('aPhase', new THREE.Float32BufferAttribute(aPhase, 1));
  g.setAttribute('aAngle', new THREE.Float32BufferAttribute(aAngle, 1));
  return g;
}

const tendrilMat = new THREE.ShaderMaterial({
  uniforms: audioUniforms,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexShader: /* glsl */`
    uniform float uTime;
    uniform float uBass;
    uniform float uTreble;

    attribute float aLen;
    attribute float aPhase;
    attribute float aAngle;

    varying float vLen;

    void main() {
      vec3 p = position;

      // Wiggle grows toward the tip and with treble.
      float amp = (0.12 + uTreble * 0.7) * aLen;
      p.x += sin(uTime * 3.0 + aLen * 8.0 + aPhase) * amp;
      p.z += cos(uTime * 2.4 + aLen * 7.0 + aPhase) * amp;

      // Whole-strand sway from the bass pump.
      float sway = uBass * 0.5 * aLen;
      p.x += sin(uTime * 1.2 + aAngle) * sway;
      p.z += cos(uTime * 1.1 + aAngle) * sway;

      vLen = aLen;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
    }
  `,
  fragmentShader: /* glsl */`
    uniform float uTreble;
    varying float vLen;

    void main() {
      vec3 bio  = vec3(0.12, 0.75, 1.0);
      vec3 neon = vec3(1.0, 0.2, 0.72);
      vec3 c = mix(bio, neon, clamp(uTreble * 1.4, 0.0, 1.0));

      // Fade to the tip, brighten with treble.
      float a = (1.0 - vLen) * 0.75 + 0.08;
      gl_FragColor = vec4(c * (1.0 + uTreble * 0.9), a);
    }
  `
});

const tendrils = new THREE.LineSegments(buildTendrils(), tendrilMat);
scene.add(tendrils);

/* ----------------------------------------------------------------------------
   INNER CORE GLOW + DYNAMIC POINT LIGHTS (pulse with the music)
---------------------------------------------------------------------------- */
const coreGlow = new THREE.Mesh(
  new THREE.SphereGeometry(0.5, 24, 24),
  new THREE.MeshBasicMaterial({
    color: 0x66e0ff,
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  })
);
coreGlow.position.y = 0.1;
scene.add(coreGlow);

const lights = [];
const lightColors = [0x33b5ff, 0xff44aa, 0x55ffcc];
for (let i = 0; i < 3; i++) {
  const l = new THREE.PointLight(lightColors[i], 2.0, 8, 2);
  l.position.set(0, 0.2, 0);
  scene.add(l);
  lights.push(l);
}
scene.add(new THREE.AmbientLight(0x0a2030, 0.6));

/* ----------------------------------------------------------------------------
   MARINE SNOW — drifting particles for ocean depth
---------------------------------------------------------------------------- */
const SNOW = 600;
const snowGeo = new THREE.BufferGeometry();
const snowPos = new Float32Array(SNOW * 3);
for (let i = 0; i < SNOW; i++) {
  snowPos[i * 3]     = (Math.random() - 0.5) * 30;
  snowPos[i * 3 + 1] = (Math.random() - 0.5) * 30;
  snowPos[i * 3 + 2] = (Math.random() - 0.5) * 30;
}
snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPos, 3));
const snow = new THREE.Points(snowGeo, new THREE.PointsMaterial({
  color: 0x88c8ff,
  size: 0.05,
  transparent: true,
  opacity: 0.35,
  blending: THREE.AdditiveBlending,
  depthWrite: false
}));
scene.add(snow);

/* ----------------------------------------------------------------------------
   AUDIO — Web Audio API + AnalyserNode (initialized on user gesture)
---------------------------------------------------------------------------- */
let audioCtx = null;
let analyser = null;
let freqData = null;
let playing = false;
let masterGain = null;

const btn = document.getElementById('audioBtn');

async function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;                  // -> 128 frequency bins
  analyser.smoothingTimeConstant = 0.82;
  freqData = new Uint8Array(analyser.frequencyBinCount);

  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.9;
  analyser.connect(masterGain);
  masterGain.connect(audioCtx.destination);

  // Try to stream the placeholder track; fall back to a generated drone.
  try {
    const res = await fetch(TRACK_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const arr = await res.arrayBuffer();
    const audioBuf = await audioCtx.decodeAudioData(arr);
    const src = audioCtx.createBufferSource();
    src.buffer = audioBuf;
    src.loop = true;
    src.connect(analyser);
    src.start();
  } catch (err) {
    console.warn('Track load failed, using generated ambient drone:', err.message);
    startFallbackDrone();
  }
}

// Evolving bass + shimmer so the analyser always has rich data to react to.
function startFallbackDrone() {
  const now = audioCtx.currentTime;

  // Low pulse — drives the bell pump.
  const bass = audioCtx.createOscillator();
  bass.type = 'sine';
  bass.frequency.value = 58;
  const bassGain = audioCtx.createGain();
  bassGain.gain.value = 0.0;
  const bassLfo = audioCtx.createOscillator();
  bassLfo.frequency.value = 0.6;
  const bassLfoGain = audioCtx.createGain();
  bassLfoGain.gain.value = 0.5;
  bassLfo.connect(bassLfoGain);
  bassLfoGain.connect(bassGain.gain);
  bass.connect(bassGain).connect(analyser);

  // Mid pad.
  const pad = audioCtx.createOscillator();
  pad.type = 'triangle';
  pad.frequency.value = 174;
  const padGain = audioCtx.createGain();
  padGain.gain.value = 0.12;
  pad.connect(padGain).connect(analyser);

  // High shimmer — drives tendril wiggle + color shift.
  const shimmer = audioCtx.createOscillator();
  shimmer.type = 'sawtooth';
  shimmer.frequency.value = 1320;
  const shimmerGain = audioCtx.createGain();
  shimmerGain.gain.value = 0.0;
  const shimmerLfo = audioCtx.createOscillator();
  shimmerLfo.frequency.value = 0.27;
  const shimmerLfoGain = audioCtx.createGain();
  shimmerLfoGain.gain.value = 0.06;
  shimmerLfo.connect(shimmerLfoGain);
  shimmerLfoGain.connect(shimmerGain.gain);
  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 800;
  shimmer.connect(shimmerGain).connect(hp).connect(analyser);

  [bass, bassLfo, pad, shimmer, shimmerLfo].forEach(o => o.start(now));
}

btn.addEventListener('click', async () => {
  if (!audioCtx) {
    btn.textContent = '◌ loading…';
    await initAudio();
  }
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  playing = !playing;
  if (playing) {
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    btn.textContent = '❚❚ Pause';
  } else {
    await audioCtx.suspend();
    btn.textContent = '▶ Resume';
  }
});

/* ----------------------------------------------------------------------------
   AUDIO ANALYSIS -> smoothed bass / treble / spectrum
---------------------------------------------------------------------------- */
let bass = 0, treble = 0;
const freqSmooth = new Array(8).fill(0);

function sampleAudio() {
  if (!analyser) return;
  analyser.getByteFrequencyData(freqData);
  const bins = freqData.length;

  // Bass = low bins, treble = upper bins.
  let b = 0;
  for (let i = 1; i < 8; i++) b += freqData[i];
  b /= (7 * 255);

  let t = 0;
  for (let i = Math.floor(bins * 0.45); i < bins; i++) t += freqData[i];
  t /= ((bins - Math.floor(bins * 0.45)) * 255);

  // Smooth for organic motion.
  bass   += (b - bass) * 0.18;
  treble += (t * 1.4 - treble) * 0.22;

  // Downsample whole spectrum into 8 bands for the shader array.
  const step = bins / 8;
  for (let i = 0; i < 8; i++) {
    let sum = 0;
    const start = Math.floor(i * step);
    const end = Math.floor((i + 1) * step);
    for (let j = start; j < end; j++) sum += freqData[j];
    const v = sum / ((end - start) * 255);
    freqSmooth[i] += (v - freqSmooth[i]) * 0.2;
  }
}

/* ----------------------------------------------------------------------------
   RENDER LOOP
---------------------------------------------------------------------------- */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  sampleAudio();

  // Idle "breathing" before audio starts so it's never static.
  const idle = playing ? 0 : 0.12 + 0.1 * Math.sin(t * 0.8);
  const idleT = playing ? 0 : 0.08 + 0.06 * Math.sin(t * 1.7);

  const bassVal = Math.max(bass, idle);
  const trebleVal = Math.max(treble, idleT);

  // Push to shared uniforms.
  audioUniforms.uTime.value = t;
  audioUniforms.uBass.value = bassVal;
  audioUniforms.uTreble.value = trebleVal;
  for (let i = 0; i < 8; i++) {
    audioUniforms.uFreq.value[i] = playing ? freqSmooth[i] : 0.1 * (0.5 + 0.5 * Math.sin(t + i));
  }

  // Gentle drift of the whole creature.
  bell.position.y = -0.5 + Math.sin(t * 0.5) * 0.25;
  tendrils.position.copy(bell.position);
  coreGlow.position.copy(bell.position);
  coreGlow.position.y += 0.1;

  // Core glow pulses with bass.
  const cs = 1.0 + bassVal * 1.6;
  coreGlow.scale.setScalar(cs);
  coreGlow.material.opacity = 0.35 + bassVal * 0.5;

  // Dynamic point lights orbit + pulse inside the bell.
  for (let i = 0; i < lights.length; i++) {
    const a = t * 0.8 + (i / lights.length) * Math.PI * 2;
    const l = lights[i];
    l.position.set(
      Math.cos(a) * 0.6,
      bell.position.y + 0.2 + Math.sin(t + i) * 0.2,
      Math.sin(a) * 0.6
    );
    l.intensity = 1.2 + bassVal * 6.0 + trebleVal * 2.0;
  }

  // Marine snow drifts upward, wraps around.
  const sp = snow.geometry.attributes.position;
  for (let i = 0; i < SNOW; i++) {
    let y = sp.getY(i) + 0.004;
    if (y > 15) y = -15;
    sp.setY(i, y);
  }
  sp.needsUpdate = true;
  snow.rotation.y = t * 0.02;

  controls.update();
  renderer.render(scene, camera);
}
animate();

/* ----------------------------------------------------------------------------
   RESIZE
---------------------------------------------------------------------------- */
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
